services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: test_app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: test_app_development
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_app -d test_app_development"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: ./bin/rails server
    volumes:
      - .:/rails
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://test_app:password@db:5432/test_app_development
      RAILS_ENV: development
      SOLID_QUEUE_IN_PUMA: "1"
      BINDING: "0.0.0.0"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
